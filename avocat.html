<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinaigrette.ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.14);
            --text: #f0efe9;
            --text-muted: rgba(255,255,255,0.45);
            --text-subtle: rgba(255,255,255,0.25);
            --accent: #c8b560;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 24px;
            gap: 20px;
        }

        header a {
            font-size: 0.82rem;
            font-weight: 400;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        header a:hover {
            color: var(--text);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            margin-top: -80px;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 36px;
        }

        .logo img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2.6rem, 5vw, 3.8rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .logo h1 span {
            color: var(--accent);
        }

        .search-box {
            width: 100%;
            max-width: 582px;
            position: relative;
        }

        .search-box svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-subtle);
            pointer-events: none;
        }

        .search-box input {
            width: 100%;
            height: 48px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0 20px 0 46px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box input::placeholder {
            color: var(--text-subtle);
        }

        .search-box input:hover {
            border-color: var(--border-hover);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .search-box input:focus {
            border-color: var(--border-hover);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 28px;
        }

        .buttons button {
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 400;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 9px 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .buttons button:hover {
            border-color: var(--border);
            color: var(--text);
        }

        footer {
            padding: 18px 24px;
            border-top: 1px solid var(--border);
        }

        .footer-top {
            font-size: 0.8rem;
            color: var(--text-subtle);
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            font-size: 0.78rem;
            color: var(--text-subtle);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .logo img {
                width: 120px;
                height: 120px;
            }

            .search-box input {
                height: 44px;
                font-size: 0.9rem;
            }

            .buttons button {
                font-size: 0.78rem;
                padding: 8px 14px;
            }

            .footer-bottom {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#">Connexion</a>
    </header>

    <main>
        <div class="logo">
            <img src="assets/avocat-hero.png" alt="Vinaigrette.ai">
            <h1>Vinaigrette<span>.ai</span></h1>
        </div>

        <div class="search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" placeholder="Rechercher dans le droit français…" autocomplete="off" spellcheck="false">
        </div>

        <div class="buttons">
            <button>Recherche juridique</button>
        </div>
    </main>

    <footer>
        <div class="footer-top">France</div>
        <div class="footer-bottom">
            <div class="footer-links">
                <a href="#">À propos</a>
                <a href="#">Confidentialité</a>
                <a href="#">Conditions</a>
            </div>
            <div class="footer-links">
                <a href="#">Paramètres</a>
                <a href="#">Aide</a>
            </div>
        </div>
    </footer>

</body>
</html>
